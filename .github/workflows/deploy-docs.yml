name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'documentation/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r documentation/requirements.txt

      - name: Configure git
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Deploy docs
        run: mike deploy --push --update-aliases ${{ github.ref_name }} latest --config-file documentation/mkdocs.yml

      - name: Set default version
        run: mike set-default --push latest --config-file documentation/mkdocs.yml
